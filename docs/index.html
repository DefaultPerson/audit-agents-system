<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autonomous Audit Agents — Pipeline</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#04070a"/>
    <g stroke="#3ef2a4" stroke-width="2.5" fill="none" stroke-linecap="round">
      <circle cx="30" cy="50" r="9"/><circle cx="50" cy="50" r="9"/><circle cx="70" cy="50" r="9"/>
      <line x1="39" y1="50" x2="41" y2="50"/><line x1="59" y1="50" x2="61" y2="50"/>
    </g>
    <circle cx="50" cy="50" r="2.5" fill="#46d6ff"/>
  </svg>
</template>
</head>
<body data-om-exportable-video-with-duration-secs="17">
<canvas id="particles"></canvas>
<div class="bg-grid"></div>
<div class="bg-vignette"></div>
<div class="vuln-flash" id="vflash"></div>

<div class="app">
  <header>
    <div class="brand">
      <span class="live-dot"></span>
      <div>
        <h1><span class="accent">audit-agents</span> // autonomous_research</h1>
        <div class="sub">closed-source EVM vulnerability pipeline · <a href="https://github.com/DefaultPerson/audit-agents-system" target="_blank" rel="noopener" style="color:#46d6ff;text-decoration:none;border-bottom:1px solid rgba(70,214,255,.4);">github&nbsp;↗</a></div>
      </div>
    </div>
    <div class="metrics">
      <div class="metric" data-k="contracts"><div class="val">0</div><div class="lab">candidates</div></div>
      <div class="metric" data-k="functions"><div class="val">0</div><div class="lab">decompiled</div></div>
      <div class="metric" data-k="hypotheses"><div class="val">0</div><div class="lab">hypotheses</div></div>
      <div class="metric" data-k="pocs"><div class="val">0</div><div class="lab">validated</div></div>
      <div class="metric is-confirmed" data-k="confirmed"><div class="val">0</div><div class="lab">confirmed</div></div>
    </div>
  </header>

  <main>
    <!-- PIPELINE -->
    <section class="pipeline-wrap">
      <div class="pipeline-head">
        <div class="section-tag">the loop &nbsp;·&nbsp; <b>snapshot → testnet-proven exploit</b></div>
        <div class="controls">
          <span class="speed">slow <input id="speed" type="range" min="0" max="100" value="50"> fast</span>
          <button class="ctl-btn active" id="playBtn">❚❚&nbsp; auto</button>
        </div>
      </div>
      <div class="track" id="track">
        <div class="rail"></div>
        <div class="rail-fill" id="railFill"></div>
        <div class="packet" id="packet"></div>
        <div class="nodes" id="nodes"></div>
      </div>
    </section>

    <!-- DETAIL + CONSOLE -->
    <section class="bottom">
      <div class="panel detail" id="detail">
        <div class="panel-bar" style="position:absolute;inset:0 0 auto 0;border:none;background:none;justify-content:flex-end;">
          <span class="corner" id="dCorner">—</span>
        </div>
        <div class="num-tag" id="dNum">01</div>
        <div>
          <h2 id="dName">Ingest</h2>
          <div class="role-line" id="dRole">Target Acquisition</div>
        </div>
        <p class="tagline" id="dTagline"></p>
        <div class="diagram" id="dDiagram"></div>
        <div class="mechanics" id="dMech"></div>
      </div>

      <div class="panel">
        <div class="panel-bar" id="consoleBar">
          <span class="dotrow"><i></i><i></i><i></i></span>
          agent.console
          <span class="spacer"></span>
          <span class="corner">live ●</span>
        </div>
        <div class="console-body">
          <div class="log" id="log"></div>
          <div class="code" id="code"></div>
        </div>
      </div>
    </section>
  </main>
</div>

<div class="scanlines"></div>

<script src="data.js"></script>
<script src="diagrams.js"></script>
<script src="particles.js"></script>
<script src="app.js"></script>
</body>
</html>
